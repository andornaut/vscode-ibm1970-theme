name: Generate color swatches

on:
  push:
    branches: [main]
    paths:
      - themes/**

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: andornaut/color-swatches-action@main
        with:
          files: 'themes/*.json'
          out-dir: 'swatches'
